services:
  postgres:
    image: postgres:16
    container_name: forgequeue-postgres
    environment:
      POSTGRES_USER: forgequeue
      POSTGRES_PASSWORD: forgequeue
      POSTGRES_DB: forgequeue
    ports:
      - "5433:5432"
    volumes:
      - forgequeue-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forgequeue -d forgequeue"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  forgequeue-postgres-data: