name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: forgequeue
          POSTGRES_PASSWORD: forgequeue
          POSTGRES_DB: forgequeue
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U forgequeue -d forgequeue"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgres://forgequeue:forgequeue@localhost:5432/forgequeue?sslmode=disable

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Install migrate
        run: |
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Run migrations
        run: migrate -path migrations -database "$TEST_DATABASE_URL" up

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...