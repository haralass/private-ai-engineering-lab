<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Upload Vehicle Documents</title>
</head>
<body>

<h2>Upload Vehicle Documents</h2>

<form action="upload_documents.php" method="POST" enctype="multipart/form-data">
    <label>Vehicle ID:</label><br>
    <input type="text" name="vehicle_id" required><br><br>

    <label>Άδεια Κυκλοφορίας:</label><br>
    <input type="file" name="license_doc" required><br><br>

    <label>Ασφάλεια:</label><br>
    <input type="file" name="insurance_doc" required><br><br>

    <button type="submit">Submit</button>
</form>

</body>
</html>
